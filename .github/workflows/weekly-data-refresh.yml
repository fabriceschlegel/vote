name: Weekly Data Refresh

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:
    inputs:
      archive_window_years:
        description: "Override BALLOT_LIGHT_ARCHIVE_WINDOW_YEARS for this run"
        required: false
        type: string
      openai_model:
        description: "Override OPENAI_MODEL for this run"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: weekly-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-refresh.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements-refresh.txt

      - name: Refresh source data
        env:
          BALLOT_LIGHT_ARCHIVE_WINDOW_YEARS: ${{ inputs.archive_window_years || vars.BALLOT_LIGHT_ARCHIVE_WINDOW_YEARS || '10' }}
        run: npm run refresh:data

      - name: Verify OpenAI secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY GitHub secret is required for candidate page updates." >&2
            exit 1
          fi

      - name: Generate candidate page data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.openai_model || vars.OPENAI_MODEL || 'gpt-5.4' }}
          BALLOT_LIGHT_CANDIDATE_HISTORY_CYCLES: ${{ vars.BALLOT_LIGHT_CANDIDATE_HISTORY_CYCLES || '2' }}
        run: npm run generate:candidate-data

      - name: Upload refresh reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-data-refresh-reports
          path: |
            data/official-record-archive.json
            data/derived/source-quality-report.json
            data/derived/official-record-quality-report.json
            data/generated/candidate-profiles.json
            data/generated/candidate-sync-metadata.json
          if-no-files-found: warn

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit refreshed data
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No tracked changes to commit."
            exit 0
          fi
          git commit -m "chore: weekly data refresh"
          git push origin HEAD:${GITHUB_REF_NAME}
